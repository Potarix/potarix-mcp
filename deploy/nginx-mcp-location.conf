# Potarix MCP server (Streamable HTTP) — paste this location block INSIDE the
# existing `server { server_name api.potarix.com; ... }` block in
# /etc/nginx/sites-enabled/api.potarix.com, ABOVE the catch-all `location /`.
#
# Public endpoint: https://api.potarix.com/mcp
# Backend: the potarix-mcp systemd service on 127.0.0.1:8011.
# This is additive and isolated; it does not touch /enricher/, /farm-to-door/, or /.

location = /mcp {
    proxy_pass http://127.0.0.1:8011/mcp;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Streamable HTTP can stream Server-Sent Events; disable buffering so
    # chunks flush to the client immediately.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;

    client_max_body_size 1m;
}
